<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="boltF" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background matching extension bg -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bgF)"/>
  <!-- Subtle border like the UI panels -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="none" stroke="#334155" stroke-width="1.5"/>
  <!-- Soft glow circle behind bolt -->
  <circle cx="64" cy="64" r="38" fill="#14b8a6" opacity="0.07"/>
  <!-- Bold lightning bolt with teal gradient -->
  <polygon points="74,16 38,68 58,68 48,112 90,54 68,54" fill="url(#boltF)"/>
  <!-- Energy dots in teal tones -->
  <circle cx="94" cy="28" r="3" fill="#2dd4bf" opacity="0.6"/>
  <circle cx="104" cy="48" r="2" fill="#14b8a6" opacity="0.4"/>
  <circle cx="26" cy="84" r="2.5" fill="#2dd4bf" opacity="0.45"/>
  <circle cx="20" cy="62" r="2" fill="#0d9488" opacity="0.35"/>
  <circle cx="100" cy="72" r="1.5" fill="#2dd4bf" opacity="0.3"/>
  <circle cx="34" cy="104" r="2" fill="#14b8a6" opacity="0.35"/>
</svg>
